<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .lead { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 10px; }
  .ramp { display: flex; gap: 8px; align-items: flex-end; height: 70px; }
  .bar { flex: 1; border-radius: var(--radius-xs) var(--radius-xs) 0 0; display:flex; align-items:flex-end; justify-content:center; }
  .bar span { font-family: var(--font-mono); font-size: 9.5px; color: #fff; padding-bottom: 4px; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
  .leg { display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-2); }
  .leg i { width: 11px; height: 11px; border-radius: 2px; display: inline-block; }
</style>
</head>
<body>
  <div class="lead">Paleta de dados — categórica</div>
  <div class="ramp">
    <div class="bar" style="background:var(--viz-1);height:100%"><span>1</span></div>
    <div class="bar" style="background:var(--viz-2);height:80%"><span>2</span></div>
    <div class="bar" style="background:var(--viz-3);height:64%"><span>3</span></div>
    <div class="bar" style="background:var(--viz-4);height:52%"><span>4</span></div>
    <div class="bar" style="background:var(--viz-5);height:40%"><span>5</span></div>
    <div class="bar" style="background:var(--viz-6);height:30%"><span style="color:var(--green-900)">6</span></div>
  </div>
  <div class="legend">
    <span class="leg"><i style="background:var(--viz-1)"></i>verde #2A5E48</span>
    <span class="leg"><i style="background:var(--viz-2)"></i>âmbar #C0871A</span>
    <span class="leg"><i style="background:var(--viz-3)"></i>terracota #A8442A</span>
    <span class="leg"><i style="background:var(--viz-4)"></i>petróleo #2B7484</span>
    <span class="leg"><i style="background:var(--viz-5)"></i>ocre #8A6D2F</span>
    <span class="leg"><i style="background:var(--viz-6)"></i>verde-claro</span>
  </div>
</body>
</html>
