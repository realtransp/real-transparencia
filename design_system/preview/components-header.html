<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 16px; }
  .nav { background: var(--green-800); border-radius: var(--radius-md); display: flex; align-items: center; gap: 18px; padding: 0 18px; height: 60px; }
  .mark { width: 34px; height: 34px; border-radius: var(--radius-sm); background: var(--amber-500); display:flex; align-items:center; justify-content:center; font-family: var(--font-serif); font-weight: 600; font-size: 15px; color: var(--green-950); flex:none; }
  .wm { font-family: var(--font-serif); font-weight: 600; font-size: 18px; color: #fff; letter-spacing: -0.01em; }
  .wm .r { color: var(--amber-400); }
  .links { display: flex; gap: 20px; margin-left: 8px; }
  .links a { font-family: var(--font-sans); font-size: 13.5px; font-weight: 500; color: var(--green-200); }
  .links a.on { color: #fff; }
  .right { margin-left: auto; display:flex; align-items:center; gap:10px; }
  .search { display:flex; align-items:center; gap:7px; background: rgba(255,255,255,0.1); border-radius: var(--radius-pill); padding: 7px 13px; }
  .search svg { width: 15px; height: 15px; color: var(--green-200); }
  .search span { font-family: var(--font-sans); font-size: 12.5px; color: var(--green-200); }
</style>
</head>
<body>
  <div class="nav">
    <div class="mark">R$</div>
    <div class="wm"><span class="r">R$</span> Transparência</div>
    <div class="links">
      <a href="#" class="on">Agora</a>
      <a href="#">Deputados</a>
      <a href="#">Votações</a>
      <a href="#">Gastos</a>
    </div>
    <div class="right">
      <div class="search"><i data-lucide="search"></i><span>Buscar deputado…</span></div>
    </div>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
