<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .lead { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 6px; }
  .big { font-family: var(--font-serif); font-weight: 600; font-size: 46px; line-height: 1.04; letter-spacing: -0.02em; color: var(--fg-1); }
  .sub { font-family: var(--font-serif); font-weight: 400; font-size: 19px; line-height: 1.5; color: var(--fg-2); margin-top: 10px; max-width: 56ch; }
  .meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); margin-top: 12px; }
</style>
</head>
<body>
  <div class="lead">IBM Plex Serif — títulos editoriais</div>
  <div class="big">O que o seu deputado<br>fez esta semana</div>
  <div class="sub">Serifada para manchetes e títulos: autoridade de jornalismo de dados, confiança institucional.</div>
  <div class="meta">Weights 400 · 500 · 600 · 700 · italic — tracking −0.02em</div>
</body>
</html>
