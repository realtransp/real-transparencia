<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .lead { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 10px; }
  .pills { display: flex; flex-wrap: wrap; gap: 10px; }
  .pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 12px 6px 10px; border-radius: var(--radius-pill);
    font-family: var(--font-sans); font-size: 13px; font-weight: 600;
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .hexrow { display: flex; gap: 18px; margin-top: 14px; }
  .hexrow span { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); }
</style>
</head>
<body>
  <div class="lead">Status de votação &amp; tramitação</div>
  <div class="pills">
    <span class="pill" style="background:var(--status-aprovado-bg);color:var(--green-700)"><span class="dot" style="background:var(--status-aprovado)"></span>Aprovado · Sim</span>
    <span class="pill" style="background:var(--status-rejeitado-bg);color:var(--clay-700)"><span class="dot" style="background:var(--status-rejeitado)"></span>Rejeitado · Não</span>
    <span class="pill" style="background:var(--status-tramitando-bg);color:var(--amber-700)"><span class="dot" style="background:var(--status-tramitando)"></span>Em tramitação</span>
    <span class="pill" style="background:var(--status-ausente-bg);color:var(--ink-2)"><span class="dot" style="background:var(--status-ausente)"></span>Ausente · Abstenção</span>
    <span class="pill" style="background:var(--status-info-bg);color:var(--petro-700)"><span class="dot" style="background:var(--status-info)"></span>Informação</span>
  </div>
  <div class="hexrow">
    <span>aprovado #2A5E48</span>
    <span>rejeitado #A8442A</span>
    <span>tramitando #9C6E12</span>
    <span>ausente #8A8268</span>
  </div>
</body>
</html>
