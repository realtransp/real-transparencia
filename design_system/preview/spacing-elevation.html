<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .lead { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 16px; }
  .grid { display: flex; gap: 22px; }
  .item { text-align: center; }
  .box { width: 110px; height: 64px; background: var(--paper-1); border-radius: var(--radius-md); border: 1px solid var(--border); }
  .item .n { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-top: 12px; }
</style>
</head>
<body>
  <div class="lead">Elevação — sombras suaves, tom quente</div>
  <div class="grid">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="n">sm — repouso</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="n">md — cartão</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="n">lg — flutuante</div></div>
  </div>
  <div class="spec-note" style="margin-top:18px;">Sombras tingidas de tinta (rgba 30,27,20). Nunca pretas puras. Bordas hairline fazem a maior parte da separação.</div>
</body>
</html>
