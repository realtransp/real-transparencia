<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .lead { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 12px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-family: var(--font-sans); font-size: 12.5px; font-weight: 600; color: var(--fg-2); margin-bottom: 6px; }
  .control {
    display: flex; align-items: center; gap: 8px;
    background: var(--paper-1); border: 1px solid var(--border-strong);
    border-radius: var(--radius-md); padding: 0 12px; height: 42px;
  }
  .control svg { width: 17px; height: 17px; color: var(--ink-3); }
  .control input, .control select {
    border: 0; outline: 0; background: transparent; width: 100%;
    font-family: var(--font-sans); font-size: 15px; color: var(--fg-1);
  }
  .control.focus { border-color: var(--green-600); box-shadow: 0 0 0 3px var(--green-100); }
  .search { background: var(--paper-2); }
</style>
</head>
<body>
  <div class="lead">Campos de formulário</div>
  <div class="field">
    <label>Busque um deputado</label>
    <div class="control search"><i data-lucide="search"></i><input value="" placeholder="Nome, partido ou estado…"></div>
  </div>
  <div class="field">
    <label>Estado (UF)</label>
    <div class="control"><i data-lucide="map-pin"></i><select><option>São Paulo — SP</option></select><i data-lucide="chevron-down"></i></div>
  </div>
  <div class="field" style="margin-bottom:0">
    <label style="color:var(--green-700)">Foco (ativo)</label>
    <div class="control focus"><i data-lucide="building-2"></i><input value="Câmara dos Deputados"></div>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
