<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .grp { margin-bottom: 14px; }
  .lead { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 8px; }
  .scale { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { height: 64px; display: flex; flex-direction: column; justify-content: flex-end; padding: 7px 8px; }
  .sw .n { font-family: var(--font-mono); font-size: 10px; }
  .sw .h { font-family: var(--font-mono); font-size: 9.5px; opacity: 0.85; }
</style>
</head>
<body>
  <div class="grp">
    <div class="lead">Ouro envelhecido — destaque / cifrão</div>
    <div class="scale">
      <div class="sw" style="background:var(--amber-700);color:#f6ebcc"><span class="n">700</span><span class="h">#80590E</span></div>
      <div class="sw" style="background:var(--amber-500);color:#3a2906"><span class="n">500 ●</span><span class="h">#C0871A</span></div>
      <div class="sw" style="background:var(--amber-400);color:#3a2906"><span class="n">400</span><span class="h">#D5A436</span></div>
      <div class="sw" style="background:var(--amber-200);color:#80590e"><span class="n">200</span><span class="h">#EED9A3</span></div>
      <div class="sw" style="background:var(--amber-100);color:#80590e"><span class="n">100</span><span class="h">#F6EBCC</span></div>
    </div>
  </div>
  <div class="grp" style="margin-bottom:0;">
    <div class="lead">Terracota / barro — ação "cobre" + alerta</div>
    <div class="scale">
      <div class="sw" style="background:var(--clay-800);color:#f6e4da"><span class="n">800</span><span class="h">#6F2C18</span></div>
      <div class="sw" style="background:var(--clay-600);color:#f6e4da"><span class="n">600 ●</span><span class="h">#A8442A</span></div>
      <div class="sw" style="background:var(--clay-500);color:#f6e4da"><span class="n">500</span><span class="h">#C2573A</span></div>
      <div class="sw" style="background:var(--clay-200);color:#8b3a22"><span class="n">200</span><span class="h">#ECC6B9</span></div>
      <div class="sw" style="background:var(--clay-100);color:#8b3a22"><span class="n">100</span><span class="h">#F6E4DA</span></div>
    </div>
  </div>
</body>
</html>
