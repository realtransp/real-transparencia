<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .lead { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 12px; }
  .nums { display: flex; gap: 26px; align-items: baseline; }
  .num { font-family: var(--font-mono); font-weight: 600; font-variant-numeric: tabular-nums; color: var(--fg-1); }
  .label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); margin-top: 4px; }
  .tabular { margin-top: 18px; font-family: var(--font-mono); font-size: 13px; }
  .tabular div { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .tabular .v { font-variant-numeric: tabular-nums; color: var(--fg-1); }
</style>
</head>
<body>
  <div class="lead">IBM Plex Mono — dados &amp; números (tabular)</div>
  <div class="nums">
    <div>
      <div class="num" style="font-size:34px;color:var(--clay-600)">R$ 218.450</div>
      <div class="label">Gasto · 2024</div>
    </div>
    <div>
      <div class="num" style="font-size:34px;color:var(--green-600)">87,2%</div>
      <div class="label">Presença</div>
    </div>
  </div>
  <div class="tabular">
    <div><span>Passagens aéreas</span><span class="v">R$ 64.120,00</span></div>
    <div><span>Combustível</span><span class="v">R$ 38.905,40</span></div>
    <div><span>Divulgação</span><span class="v">R$ 9.770,18</span></div>
  </div>
</body>
</html>
