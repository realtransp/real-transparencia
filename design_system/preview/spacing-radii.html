<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .lead { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 12px; }
  .grid { display: flex; gap: 16px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 76px; height: 60px; background: var(--green-100); border: 1.5px solid var(--green-400); }
  .item .n { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-top: 7px; }
</style>
</head>
<body>
  <div class="lead">Cantos — contidos, institucionais</div>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="n">xs · 3px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="n">sm · 5px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="n">md · 8px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="n">lg · 12px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill);width:60px"></div><div class="n">pill</div></div>
  </div>
  <div class="spec-note" style="margin-top:14px;">Padrão md (8px) em cartões e campos. Pílulas só em tags e badges de status.</div>
</body>
</html>
