<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .lead { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 12px; }
  .row-s { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .bar { background: var(--amber-400); height: 14px; border-radius: 2px; }
  .lab { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); width: 92px; flex: none; }
</style>
</head>
<body>
  <div class="lead">Espaçamento — base 4px</div>
  <div class="row-s"><span class="lab">1 · 4px</span><div class="bar" style="width:4px"></div></div>
  <div class="row-s"><span class="lab">2 · 8px</span><div class="bar" style="width:8px"></div></div>
  <div class="row-s"><span class="lab">3 · 12px</span><div class="bar" style="width:12px"></div></div>
  <div class="row-s"><span class="lab">4 · 16px</span><div class="bar" style="width:16px"></div></div>
  <div class="row-s"><span class="lab">5 · 24px</span><div class="bar" style="width:24px"></div></div>
  <div class="row-s"><span class="lab">6 · 32px</span><div class="bar" style="width:32px"></div></div>
  <div class="row-s"><span class="lab">7 · 48px</span><div class="bar" style="width:48px"></div></div>
  <div class="row-s"><span class="lab">8 · 64px</span><div class="bar" style="width:64px"></div></div>
  <div class="row-s" style="margin-bottom:0"><span class="lab">9 · 96px</span><div class="bar" style="width:96px"></div></div>
</body>
</html>
