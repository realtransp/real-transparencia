<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .scale { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { height: 84px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 9px; }
  .sw .n { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; }
  .sw .h { font-family: var(--font-mono); font-size: 10px; opacity: 0.8; }
  .lead { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="lead">Pinheiro / petróleo — primária</div>
  <div class="scale">
    <div class="sw" style="background:var(--green-950);color:#cdd8d1"><span class="n">950</span><span class="h">#0B221A</span></div>
    <div class="sw" style="background:var(--green-800);color:#dfe9e2"><span class="n">800 ●</span><span class="h">#163A2C</span></div>
    <div class="sw" style="background:var(--green-600);color:#e6efe9"><span class="n">600</span><span class="h">#2A5E48</span></div>
    <div class="sw" style="background:var(--green-400);color:#15302470"><span class="n">400</span><span class="h">#5A917A</span></div>
    <div class="sw" style="background:var(--green-200);color:#163a2c"><span class="n">200</span><span class="h">#C2D6CB</span></div>
    <div class="sw" style="background:var(--green-50);color:#2a5e48"><span class="n">50</span><span class="h">#EEF4EF</span></div>
  </div>
  <div class="spec-note" style="margin-top:10px;">● 800 é a cor de marca — usada em cabeçalhos, navegação e superfícies invertidas.</div>
</body>
</html>
