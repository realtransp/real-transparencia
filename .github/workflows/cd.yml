name: CD (deploy Railway)

# Deploy manual: disparado pelo mantenedor via "Run workflow".
# Roda os testes antes de subir; se falharem, não faz deploy.
# Segredo necessário: RAILWAY_TOKEN (token de projeto do Railway).
on:
  workflow_dispatch:
    inputs:
      confirmar:
        description: 'Digite "deploy" para confirmar o deploy em produção'
        required: true
        default: ""

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    # Confirmação contra disparo acidental.
    if: ${{ github.event.inputs.confirmar == 'deploy' }}
    steps:
      - uses: actions/checkout@v4

      - name: Instala uv
        uses: astral-sh/setup-uv@v5

      - name: Roda os testes (porteiro antes do deploy)
        run: |
          uv sync --extra dev
          uv run pytest

      - name: Instala a Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy (web)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --service real-transparencia

      - name: Deploy (cron de ingestão)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --service ingest-cron
