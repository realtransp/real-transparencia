name: CI

# Roda os testes automaticamente em PRs e pushes na main.
# Mudanças só de documentação não disparam o CI.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - "docs/**"
      - "design_system/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - "docs/**"
      - "design_system/**"

# Um run novo no mesmo branch cancela o anterior.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Instala uv
        uses: astral-sh/setup-uv@v5

      - name: Sincroniza dependências (com dev)
        run: uv sync --extra dev

      - name: Roda os testes
        run: uv run pytest
